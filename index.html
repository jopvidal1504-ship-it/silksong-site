<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Silksong</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .card {
      background: #222;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>🎮 Silksong Downloads</h1>
  <div id="conteudo"></div>

  <script>
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        const div = document.getElementById('conteudo');

        data.downloads.forEach(item => {
          div.innerHTML += `
            <div class="card">
              <h2>${item.title}</h2>
              <p>📦 ${item.fileSize}</p>
              <p>📅 ${item.uploadDate}</p>
              <button onclick="alert('Download indisponível')">
                Baixar
              </button>
            </div>
          `;
        });
      });
  </script>

</body>
</html>
